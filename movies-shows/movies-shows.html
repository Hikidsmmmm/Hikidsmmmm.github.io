<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies & Shows</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/blank-repo-start-from-scratch/movies-shows/movies-shows.css">
</head>

<body>

    <!-- HOME BUTTON -->
    <a href="/blank-repo-start-from-scratch/index.html" class="home-button">🏠 Home</a>

    <!-- SWITCH BUTTON -->
    <a class="switch-button" id="switchBtn" onclick="toggleSections()">Shows</a>

    <!-- SEARCH BAR -->
    <input type="text" id="searchBar" placeholder="Search..." onkeyup="filterCards()">

    <!-- MOVIES SECTION -->
    <div id="movies-section">
        <h1 style="text-align:center;">Movies</h1>

        <div class="movies-container">

            <a class="movie-card" href="https://drive.google.com/file/d/1_qJqk2Ss1f45puz3xGQcdD1NxM3ipupj/view">Ant-Man</a>
            <a class="movie-card" href="https://loadedfiles.org/c9755193327a6e42?pt=SHV5cGlPUXhYRXpjUHplSUhOYjF0M0ZQY210aWRYRktaVEp5UzBodlptNDNSa0ZvWjJjOVBRPT0%3D">The Amazing Spider-Man 2</a>
            <a class="movie-card" href="https://drive.google.com/file/d/1_g_fq1MEbqXuapY_dxXSdohAx8zmxwOX/view">Batman The Dark Knight</a>
            <a class="movie-card" href="https://www.netflix.com/title/80057281">Stranger Things</a>
            <a class="movie-card" href="https://www.imdb.com/title/tt3107288/">The Flash</a>
            <a class="movie-card" href="https://www.imdb.com/title/tt4154796/">Avengers: Endgame</a>

        </div>
    </div>

    <!-- SHOWS SECTION -->
    <div id="shows-section" style="display:none;">
        <h1 style="text-align:center;">Shows</h1>

        <div class="movies-container">

            <a class="movie-card" href="https://www.netflix.com/title/80057281">Stranger Things</a>
            <a class="movie-card" href="https://www.imdb.com/title/tt3107288/">The Flash</a>
            <a class="movie-card" href="https://www.imdb.com/title/tt4574334/">Arrow</a>

        </div>
    </div>

    <!-- SWITCH + SEARCH LOGIC -->
    <script>
        function toggleSections() {
            const movies = document.getElementById("movies-section");
            const shows = document.getElementById("shows-section");
            const btn = document.getElementById("switchBtn");

            if (movies.style.display === "none") {
                movies.style.display = "block";
                shows.style.display = "none";
                btn.textContent = "Shows";
            } else {
                movies.style.display = "none";
                shows.style.display = "block";
                btn.textContent = "Movies";
            }

            filterCards(); // keep search working after switching
        }

        function filterCards() {
            const input = document.getElementById("searchBar").value.toLowerCase();
            const cards = document.querySelectorAll(".movie-card");

            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(input) ? "flex" : "none";
            });
        }
    </script>

</body>
</html>
