  <script>
    (function() {
      const userTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const cleanLocation = userTimeZone.split('/').pop().replace('_', ' ');
      document.getElementById('widget-location').textContent = cleanLocation;

      function updateWidgetClock() {
        const now = new Date();
        
        const timeOptions = {
          timeZone: userTimeZone,
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: true
        };
        
        const dateOptions = {
          timeZone: userTimeZone,
          weekday: 'short',
          month: 'short',
          day: 'numeric'
        };

        const timeElement = document.getElementById('widget-time');
        const dateElement = document.getElementById('widget-date');

        if(timeElement) timeElement.textContent = now.toLocaleTimeString('en-US', timeOptions);
        if(dateElement) dateElement.textContent = now.toLocaleDateString('en-US', dateOptions);
      }

      updateWidgetClock();
      setInterval(updateWidgetClock, 1000);
    })();
  </script>

 <script>
// ---------------- DARK MODE ----------------
 if (localStorage.getItem("darkMode") === "enabled") {
     document.body.classList.add("dark");
 }

 function toggleDarkMode() {
     document.body.classList.toggle("dark");
     localStorage.setItem("darkMode",
         document.body.classList.contains("dark") ? "enabled" : "disabled"
     );
 }

// ---------------- SIDEBAR TOGGLE ----------------
 function toggleSidebar() {
     const sidebar = document.getElementById("sidebar");
     sidebar.classList.toggle("closed");
     localStorage.setItem("sidebarClosed",
         sidebar.classList.contains("closed")
     );
 }

 // Load saved sidebar state
 window.onload = () => {
     if (localStorage.getItem("sidebarClosed") === "true") {
         document.getElementById("sidebar").classList.add("closed");
     }
 };
 </script>
